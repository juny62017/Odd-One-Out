<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odd One Out</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">

        <h1>Odd One Out</h1>

        <p class="subtitle">
            Find The Different Box
        </p>

        <div class="top-bar">

            <div class="card">
                <p>Score</p>
                <h2 class="score">0</h2>
            </div>

            <div class="card">
                <p>Level</p>
                <h2 class="level">1</h2>
            </div>

            <div class="card">
                <p>Time</p>
                <h2 class="timer">30</h2>
            </div>

            <div class="card">
                <p>Best</p>
                <h2 class="best-score">0</h2>
            </div>

        </div>

        <button class="start-btn">
            Start Game
        </button>

        <div class="grid"></div>

        <div class="game-over hidden">

            <h2>Game Over</h2>

            <p class="final-score">
                Score: 0
            </p>

            <button class="restart-btn">
                Play Again
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
